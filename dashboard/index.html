<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridBot Pro — ETH/USDT Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    :root {
      --bg-dark: #131722;
      --bg-card: #1e2232;
      --bg-hover: #2a3242;
      --border: #2f3a4d;
      --text-primary: #d1d5db;
      --text-secondary: #8b92a9;
      --accent: #3861fb;
      --green: #26a69a;
      --red: #ef5350;
      --yellow: #f9a825;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      gap: 12px;
      padding: 12px;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* LEFT SIDE — Charts */
    /* ═══════════════════════════════════════════════════════════ */
    .charts-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .chart-container {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chart-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chart-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .timeframe-buttons {
      display: flex;
      gap: 6px;
    }

    .tf-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .tf-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .tf-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .chart-wrapper {
      flex: 1;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* RIGHT SIDE — Bot Status Panel */
    /* ═══════════════════════════════════════════════════════════ */
    .status-panel {
      width: 280px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .status-header {
      padding: 16px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-hover);
    }

    .status-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .status-summary {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .summary-label {
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
    }

    .summary-value {
      font-weight: 700;
      font-family: 'Courier New', monospace;
    }

    .status-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .bot-status-item {
      padding: 12px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.2s;
    }

    .bot-status-item:hover {
      background: var(--bg-hover);
    }

    .bot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bot-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .bot-leverage {
      font-size: 0.75rem;
      color: var(--text-secondary);
      background: var(--bg-hover);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .bot-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .status-running {
      background: rgba(38, 166, 154, 0.2);
      color: var(--green);
    }

    .status-stopped {
      background: rgba(239, 83, 80, 0.2);
      color: var(--red);
    }

    .status-unknown {
      background: rgba(249, 168, 37, 0.2);
      color: var(--yellow);
    }

    .bot-pnl {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .pnl-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .pnl-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Courier New', monospace;
    }

    .pnl-positive { color: var(--green); }
    .pnl-negative { color: var(--red); }

    /* ═══════════════════════════════════════════════════════════ */
    /* Scrollbar Styling */
    /* ═══════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- LEFT: Charts -->
    <div class="charts-section">
      <!-- Chart 1 -->
      <div class="chart-container">
        <div class="chart-header">
          <div class="chart-title">📊 Grid Bot Chart</div>
          <div class="timeframe-buttons">
            <button class="tf-btn active" data-tf="5m">5m</button>
            <button class="tf-btn" data-tf="15m">15m</button>
            <button class="tf-btn" data-tf="30m">30m</button>
            <button class="tf-btn" data-tf="1d">1D</button>
          </div>
        </div>
        <div class="chart-wrapper" id="chart1"></div>
      </div>

      <!-- Chart 2 -->
      <div class="chart-container">
        <div class="chart-header">
          <div class="chart-title">📈 Trend Bot Chart</div>
          <div class="timeframe-buttons">
            <button class="tf-btn active" data-tf="5m">5m</button>
            <button class="tf-btn" data-tf="15m">15m</button>
            <button class="tf-btn" data-tf="30m">30m</button>
            <button class="tf-btn" data-tf="1d">1D</button>
          </div>
        </div>
        <div class="chart-wrapper" id="chart2"></div>
      </div>
    </div>

    <!-- RIGHT: Bot Status -->
    <div class="status-panel">
      <div class="status-header">
        <div class="status-title">Bot Status</div>
        <div class="status-summary">
          <div class="summary-item">
            <span class="summary-label">Active</span>
            <span class="summary-value" id="active-count">0/6</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Total P&L</span>
            <span class="summary-value" id="total-pnl" style="color: var(--green);">+$0.00</span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Last Update</span>
            <span class="summary-value" id="last-update">--:--</span>
          </div>
        </div>
      </div>

      <div class="status-list" id="bot-list">
        <!-- Bot items will be inserted here -->
      </div>
    </div>
  </div>

  <script>
    // ═════════════════════════════════════════════════════════════
    // TradingView Lightweight Charts Setup
    // ═════════════════════════════════════════════════════════════

    const chartConfigs = {
      chart1: { elementId: 'chart1', title: 'Grid Bot' },
      chart2: { elementId: 'chart2', title: 'Trend Bot' }
    };

    let charts = {};
    let candlestickSeries = {};

    function initChart(key) {
      const config = chartConfigs[key];
      const element = document.getElementById(config.elementId);

      const chart = LightweightCharts.createChart(element, {
        layout: {
          background: { color: '#131722' },
          textColor: '#d1d5db',
          fontSize: 12,
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI"'
        },
        grid: {
          vertLines: { color: 'rgba(42, 50, 66, 0.5)' },
          horzLines: { color: 'rgba(42, 50, 66, 0.5)' }
        },
        timeScale: {
          timeVisible: true,
          secondsVisible: true,
          tickMarkFormatter: (time, type) => {
            const date = new Date(time * 1000);
            const h = date.getHours().toString().padStart(2, '0');
            const m = date.getMinutes().toString().padStart(2, '0');
            return `${h}:${m}`;
          }
        }
      });

      candlestickSeries[key] = chart.addCandlestickSeries({
        upColor: '#26a69a',
        downColor: '#ef5350',
        borderVisible: false,
        wickUpColor: '#26a69a',
        wickDownColor: '#ef5350'
      });

      chart.timeScale().fitContent();
      charts[key] = chart;
    }

    // Initialize charts
    initChart('chart1');
    initChart('chart2');

    // Sample data (in production, fetch from API/Supabase)
    function generateCandleData() {
      const data = [];
      let price = 2000;
      const now = Math.floor(Date.now() / 1000);

      for (let i = 100; i > 0; i--) {
        const time = now - (i * 300); // 5-minute intervals
        const open = price;
        price += (Math.random() - 0.5) * 10;
        const high = Math.max(open, price) + Math.random() * 5;
        const low = Math.min(open, price) - Math.random() * 5;
        const close = price;

        data.push({ time, open, high, low, close });
      }
      return data;
    }

    const data = generateCandleData();
    candlestickSeries['chart1'].setData(data);
    candlestickSeries['chart2'].setData(data.map(d => ({
      ...d,
      close: d.close + (Math.random() - 0.5) * 5
    })));

    // Timeframe button handlers
    document.querySelectorAll('.tf-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const parent = this.parentElement;
        parent.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');

        const tf = this.dataset.tf;
        console.log(`Switched to ${tf}`);
        // In production: fetch new data for this timeframe
      });
    });

    // ═════════════════════════════════════════════════════════════
    // Bot Status Data
    // ═════════════════════════════════════════════════════════════

    const botData = [
      { name: 'Grid Bot', leverage: '2x', type: 'grid', status: 'running', pnl: 12.45 },
      { name: 'Grid Bot', leverage: '3x', type: 'grid', status: 'stopped', pnl: 8.92 },
      { name: 'Grid Bot', leverage: '5x', type: 'grid', status: 'running', pnl: 5.23 },
      { name: 'Trend Bot', leverage: '2x', type: 'trend', status: 'running', pnl: 15.67 },
      { name: 'Trend Bot', leverage: '3x', type: 'trend', status: 'unknown', pnl: 0 },
      { name: 'Trend Bot', leverage: '5x', type: 'trend', status: 'running', pnl: 22.34 }
    ];

    function renderBotStatus() {
      const list = document.getElementById('bot-list');
      list.innerHTML = '';

      let activeCount = 0;
      let totalPnL = 0;

      botData.forEach(bot => {
        if (bot.status === 'running') activeCount++;
        totalPnL += bot.pnl;

        const item = document.createElement('div');
        item.className = 'bot-status-item';

        let statusClass = `status-${bot.status}`;
        let statusIcon = bot.status === 'running' ? '✅' :
                        bot.status === 'stopped' ? '❌' : '⚠️';

        item.innerHTML = `
          <div class="bot-header">
            <span class="bot-name">${bot.name}</span>
            <span class="bot-leverage">${bot.leverage}</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <span class="bot-status-badge ${statusClass}">
              ${statusIcon} ${bot.status.toUpperCase()}
            </span>
          </div>
          <div class="bot-pnl">
            <span class="pnl-label">P&L</span>
            <span class="pnl-value ${bot.pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}">
              ${bot.pnl >= 0 ? '+' : ''}$${bot.pnl.toFixed(2)}
            </span>
          </div>
        `;

        list.appendChild(item);
      });

      document.getElementById('active-count').textContent = `${activeCount}/6`;

      const pnlElement = document.getElementById('total-pnl');
      pnlElement.textContent = `${totalPnL >= 0 ? '+' : ''}$${totalPnL.toFixed(2)}`;
      pnlElement.style.color = totalPnL >= 0 ? 'var(--green)' : 'var(--red)';

      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      document.getElementById('last-update').textContent = timeStr;
    }

    // Render initial state
    renderBotStatus();

    // Simulate live updates
    setInterval(() => {
      // Update with new data from Supabase
      botData.forEach(bot => {
        bot.pnl += (Math.random() - 0.5) * 2;
      });
      renderBotStatus();
    }, 5000);

    // Handle window resize
    window.addEventListener('resize', () => {
      Object.values(charts).forEach(chart => {
        setTimeout(() => {
          chart.applyOptions({ width: chart.parentElement.clientWidth });
        }, 0);
      });
    });
  </script>
</body>
</html>
