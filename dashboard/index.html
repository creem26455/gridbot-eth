<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridBot Pro — ETH/USDT Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --bg-dark: #131722;
      --bg-card: #1e2232;
      --bg-hover: #2a3242;
      --border: #2f3a4d;
      --text-primary: #d1d5db;
      --text-secondary: #8b92a9;
      --accent: #3861fb;
      --green: #26a69a;
      --red: #ef5350;
      --yellow: #f9a825;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow: hidden;
    }

    .main-layout {
      display: flex;
      width: 100%;
      height: 100vh;
      gap: 12px;
      padding: 12px;
      flex-direction: column;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* TOP ROW — Left sidebar + Main chart */
    /* ═══════════════════════════════════════════════════════════ */
    .top-row {
      flex: 1;
      display: flex;
      gap: 12px;
      min-height: 0;
    }

    /* LEFT SIDEBAR */
    .left-sidebar {
      width: 180px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-dark));
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    .bot-item {
      padding: 10px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.8rem;
    }

    .bot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }

    .bot-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.75rem;
    }

    .bot-lever {
      font-size: 0.7rem;
      background: var(--accent);
      color: white;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: 600;
    }

    .bot-status {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .bot-change {
      display: flex;
      align-items: baseline;
      gap: 2px;
    }

    .change-label {
      font-size: 0.65rem;
      color: var(--text-secondary);
    }

    .change-value {
      font-weight: 700;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
    }

    .change-up { color: var(--green); }
    .change-down { color: var(--red); }

    /* MAIN CHART */
    .chart-section {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chart-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chart-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chart-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .grid-badge {
      background: var(--accent);
      color: white;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .timeframe-buttons {
      display: flex;
      gap: 6px;
    }

    .tf-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .tf-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .tf-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .chart-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* BOTTOM ROW — Summary boxes + P&L Table */
    /* ═══════════════════════════════════════════════════════════ */
    .bottom-row {
      height: 240px;
      display: flex;
      gap: 12px;
      min-height: 0;
    }

    .summary-boxes {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .summary-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .summary-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .summary-amount {
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      letter-spacing: -0.02em;
    }

    .summary-count {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .amount-profit { color: var(--green); }
    .amount-loss { color: var(--red); }

    /* P&L TABLE */
    .pnl-section {
      width: 320px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .table-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .table-wrapper {
      flex: 1;
      overflow-y: auto;
      font-size: 0.75rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--bg-hover);
      color: var(--text-secondary);
      padding: 8px 6px;
      text-align: left;
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }

    td {
      padding: 8px 6px;
      border-bottom: 1px solid rgba(47, 58, 77, 0.3);
      font-family: 'Courier New', monospace;
    }

    tr:hover {
      background: var(--bg-hover);
    }

    .bot-col {
      color: var(--text-primary);
      font-weight: 500;
    }

    .pnl-positive {
      color: var(--green);
      font-weight: 600;
    }

    .pnl-negative {
      color: var(--red);
      font-weight: 600;
    }

    .summary-row {
      background: var(--bg-hover);
      font-weight: 700;
      border-top: 2px solid var(--border);
      margin-top: 4px;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* Scrollbar */
    /* ═══════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="main-layout">
    <!-- TOP ROW: Sidebar + Chart -->
    <div class="top-row">
      <!-- LEFT: Bot Status -->
      <div class="left-sidebar">
        <div class="sidebar-title">📊 Bot Status</div>
        <div id="bot-list"></div>
      </div>

      <!-- CENTER: Main Chart -->
      <div class="chart-section">
        <div class="chart-header">
          <div class="chart-title">📈 ETH/USDT Grid Chart</div>
          <div class="chart-controls">
            <div class="grid-badge" id="grid-count">78 Grids Active</div>
            <div class="timeframe-buttons">
              <button class="tf-btn active" data-tf="5m">5m</button>
              <button class="tf-btn" data-tf="15m">15m</button>
              <button class="tf-btn" data-tf="30m">30m</button>
              <button class="tf-btn" data-tf="1d">1D</button>
            </div>
          </div>
        </div>
        <div class="chart-wrapper" id="main-chart"></div>
      </div>
    </div>

    <!-- BOTTOM ROW: Summary + Table -->
    <div class="bottom-row">
      <!-- Summary Boxes -->
      <div class="summary-boxes">
        <div class="summary-box">
          <div class="summary-label">✅ Matched Orders</div>
          <div class="summary-amount amount-profit" id="matched-amount">+$234.56</div>
          <div class="summary-count" id="matched-count">120 orders</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">Active Grids</div>
          <div class="summary-amount" id="active-grids" style="color: var(--accent);">4 / 6</div>
          <div class="summary-count">Bot status</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">❌ Loss Orders</div>
          <div class="summary-amount amount-loss" id="loss-amount">-$45.32</div>
          <div class="summary-count" id="loss-count">23 orders</div>
        </div>
        <div class="summary-box">
          <div class="summary-label">Net Profit Today</div>
          <div class="summary-amount amount-profit" id="net-profit">+$189.24</div>
          <div class="summary-count">24h total</div>
        </div>
      </div>

      <!-- P&L Table -->
      <div class="pnl-section">
        <div class="table-title">P&L by Bot</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Bot</th>
                <th>Lev</th>
                <th>P&L</th>
                <th>%</th>
              </tr>
            </thead>
            <tbody id="pnl-body">
              <!-- Rows inserted here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ═════════════════════════════════════════════════════════════
    // Chart Setup
    // ═════════════════════════════════════════════════════════════

    function createChart(elementId) {
      const element = document.getElementById(elementId);
      const chart = LightweightCharts.createChart(element, {
        layout: {
          background: { color: '#131722' },
          textColor: '#d1d5db',
          fontSize: 12,
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI"'
        },
        grid: {
          vertLines: { color: 'rgba(42, 50, 66, 0.8)' },
          horzLines: { color: 'rgba(42, 50, 66, 0.8)' }
        }
      });

      const candlestickSeries = chart.addCandlestickSeries({
        upColor: '#26a69a',
        downColor: '#ef5350',
        borderVisible: false,
        wickUpColor: '#26a69a',
        wickDownColor: '#ef5350'
      });

      chart.timeScale().fitContent();
      return { chart, candlestickSeries };
    }

    // Generate sample data
    function generateCandleData() {
      const data = [];
      let price = 2000;
      const now = Math.floor(Date.now() / 1000);

      for (let i = 100; i > 0; i--) {
        const time = now - (i * 300);
        const open = price;
        price += (Math.random() - 0.5) * 10;
        const high = Math.max(open, price) + Math.random() * 5;
        const low = Math.min(open, price) - Math.random() * 5;
        const close = price;
        data.push({ time, open, high, low, close });
      }
      return data;
    }

    const chartData = createChart('main-chart');
    const data = generateCandleData();
    chartData.candlestickSeries.setData(data);

    // ═════════════════════════════════════════════════════════════
    // Bot Status & P&L Data
    // ═════════════════════════════════════════════════════════════

    const botData = [
      { name: 'Grid Bot', lev: '2x', status: 'running', pnl: 12.45, change: 0.62 },
      { name: 'Grid Bot', lev: '3x', status: 'stopped', pnl: 8.92, change: -0.45 },
      { name: 'Grid Bot', lev: '5x', status: 'running', pnl: 5.23, change: 0.26 },
      { name: 'Trend Bot', lev: '2x', status: 'running', pnl: 15.67, change: 0.78 },
      { name: 'Trend Bot', lev: '3x', status: 'unknown', pnl: 0, change: 0 },
      { name: 'Trend Bot', lev: '5x', status: 'running', pnl: 22.34, change: 1.12 }
    ];

    const summaryData = {
      matchedAmount: 234.56,
      matchedOrders: 120,
      lossAmount: 45.32,
      lossOrders: 23,
      activeGrids: 4,
      totalGrids: 6,
      netProfit: 189.24
    };

    function renderDashboard() {
      // Bot list
      const botList = document.getElementById('bot-list');
      botList.innerHTML = '';

      let activeCount = 0;
      let totalPnL = 0;

      botData.forEach(bot => {
        if (bot.status === 'running') activeCount++;
        totalPnL += bot.pnl;

        const statusIcon = bot.status === 'running' ? '✅' :
                          bot.status === 'stopped' ? '❌' : '⚠️';
        const changeClass = bot.change > 0 ? 'change-up' : bot.change < 0 ? 'change-down' : '';
        const changeSign = bot.change > 0 ? '+' : '';

        const item = document.createElement('div');
        item.className = 'bot-item';
        item.innerHTML = `
          <div class="bot-header">
            <span class="bot-name">${bot.name}</span>
            <span class="bot-lever">${bot.lev}</span>
          </div>
          <div class="bot-status">
            <span>${statusIcon} ${bot.status.toUpperCase()}</span>
          </div>
          <div class="bot-change">
            <span class="change-label">24h</span>
            <span class="change-value ${changeClass}">${changeSign}${bot.change.toFixed(2)}%</span>
          </div>
        `;
        botList.appendChild(item);
      });

      // P&L Table
      const pnlBody = document.getElementById('pnl-body');
      pnlBody.innerHTML = '';

      botData.forEach(bot => {
        const pnlClass = bot.pnl > 0 ? 'pnl-positive' : bot.pnl < 0 ? 'pnl-negative' : '';
        const pnlSign = bot.pnl > 0 ? '+' : '';
        const changeClass = bot.change > 0 ? 'change-up' : bot.change < 0 ? 'change-down' : '';
        const changeSign = bot.change > 0 ? '+' : '';

        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="bot-col">${bot.name}</td>
          <td>${bot.lev}</td>
          <td class="${pnlClass}">${pnlSign}$${bot.pnl.toFixed(2)}</td>
          <td class="${changeClass}">${changeSign}${bot.change.toFixed(2)}%</td>
        `;
        pnlBody.appendChild(row);
      });

      const summaryRow = document.createElement('tr');
      summaryRow.className = 'summary-row';
      summaryRow.innerHTML = `
        <td class="bot-col">TOTAL</td>
        <td>—</td>
        <td class="pnl-positive">+$${totalPnL.toFixed(2)}</td>
        <td>—</td>
      `;
      pnlBody.appendChild(summaryRow);

      // Summary boxes
      document.getElementById('matched-amount').textContent = `+$${summaryData.matchedAmount.toFixed(2)}`;
      document.getElementById('matched-count').textContent = `${summaryData.matchedOrders} orders`;
      document.getElementById('loss-amount').textContent = `-$${summaryData.lossAmount.toFixed(2)}`;
      document.getElementById('loss-count').textContent = `${summaryData.lossOrders} orders`;
      document.getElementById('active-grids').textContent = `${summaryData.activeGrids} / ${summaryData.totalGrids}`;
      document.getElementById('net-profit').textContent = `+$${summaryData.netProfit.toFixed(2)}`;
    }

    renderDashboard();

    // Live updates
    setInterval(() => {
      botData.forEach(bot => {
        bot.pnl += (Math.random() - 0.5) * 2;
        bot.change += (Math.random() - 0.5) * 0.2;
      });
      summaryData.matchedAmount += (Math.random() - 0.5) * 5;
      summaryData.netProfit = summaryData.matchedAmount - summaryData.lossAmount;
      renderDashboard();
    }, 5000);

    // Resize handler
    window.addEventListener('resize', () => {
      setTimeout(() => {
        chartData.chart.applyOptions({ width: chartData.chart.parentElement.clientWidth });
      }, 0);
    });
  </script>
</body>
</html>
