<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GridBot Pro — ETH/USDT Dashboard</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    :root {
      --bg-dark: #131722;
      --bg-card: #1e2232;
      --bg-hover: #2a3242;
      --border: #2f3a4d;
      --text-primary: #d1d5db;
      --text-secondary: #8b92a9;
      --accent: #3861fb;
      --green: #26a69a;
      --red: #ef5350;
      --yellow: #f9a825;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow: hidden;
    }

    .main-layout {
      display: flex;
      width: 100%;
      height: 100vh;
      gap: 12px;
      padding: 12px;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* LEFT SIDEBAR — Bot Status */
    /* ═══════════════════════════════════════════════════════════ */
    .left-sidebar {
      width: 220px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-dark));
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .bot-item {
      padding: 12px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.85rem;
    }

    .bot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bot-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .bot-lever {
      font-size: 0.75rem;
      background: var(--accent);
      color: white;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .bot-change {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .change-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .change-value {
      font-weight: 700;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }

    .change-up { color: var(--green); }
    .change-down { color: var(--red); }

    /* ═══════════════════════════════════════════════════════════ */
    /* CENTER — Charts */
    /* ═══════════════════════════════════════════════════════════ */
    .charts-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .chart-container {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chart-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chart-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .chart-info {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 0.85rem;
    }

    .grid-count {
      background: var(--accent);
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: 600;
    }

    .timeframe-buttons {
      display: flex;
      gap: 6px;
    }

    .tf-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .tf-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .tf-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .chart-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* RIGHT SIDE — Stats & Table */
    /* ═══════════════════════════════════════════════════════════ */
    .right-section {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stats-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .pnl-table {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .table-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .table-wrapper {
      flex: 1;
      overflow-y: auto;
      font-size: 0.8rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: var(--bg-hover);
      color: var(--text-secondary);
      padding: 8px 6px;
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }

    td {
      padding: 8px 6px;
      border-bottom: 1px solid rgba(47, 58, 77, 0.3);
      font-family: 'Courier New', monospace;
    }

    tr:hover {
      background: var(--bg-hover);
    }

    .bot-col {
      color: var(--text-primary);
      font-weight: 500;
    }

    .pnl-positive {
      color: var(--green);
      font-weight: 600;
    }

    .pnl-negative {
      color: var(--red);
      font-weight: 600;
    }

    .pnl-neutral {
      color: var(--text-secondary);
    }

    .summary-row {
      background: var(--bg-hover);
      font-weight: 700;
      border-top: 2px solid var(--border);
      margin-top: 4px;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* Scrollbar */
    /* ═══════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="main-layout">
    <!-- LEFT: Bot Status Sidebar -->
    <div class="left-sidebar">
      <div class="sidebar-title">📊 Bot Status</div>
      <div id="bot-list"></div>
    </div>

    <!-- CENTER: Charts -->
    <div class="charts-section">
      <!-- Chart 1 -->
      <div class="chart-container">
        <div class="chart-header">
          <div class="chart-title">Grid Bot Chart</div>
          <div class="chart-info">
            <div class="grid-count">25 Grids</div>
            <div class="timeframe-buttons">
              <button class="tf-btn active" data-tf="5m">5m</button>
              <button class="tf-btn" data-tf="15m">15m</button>
              <button class="tf-btn" data-tf="30m">30m</button>
              <button class="tf-btn" data-tf="1d">1D</button>
            </div>
          </div>
        </div>
        <div class="chart-wrapper" id="chart1"></div>
      </div>

      <!-- Chart 2 -->
      <div class="chart-container">
        <div class="chart-header">
          <div class="chart-title">Trend Bot Chart</div>
          <div class="chart-info">
            <div class="grid-count">Dynamic Range</div>
            <div class="timeframe-buttons">
              <button class="tf-btn active" data-tf="5m">5m</button>
              <button class="tf-btn" data-tf="15m">15m</button>
              <button class="tf-btn" data-tf="30m">30m</button>
              <button class="tf-btn" data-tf="1d">1D</button>
            </div>
          </div>
        </div>
        <div class="chart-wrapper" id="chart2"></div>
      </div>
    </div>

    <!-- RIGHT: Stats & P&L Table -->
    <div class="right-section">
      <div class="stats-panel">
        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
          <div>
            <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase;">Active Bots</div>
            <div style="font-size: 1.4rem; font-weight: 700;" id="active-bots">4/6</div>
          </div>
          <div>
            <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase;">Total P&L</div>
            <div style="font-size: 1.4rem; font-weight: 700; color: var(--green);" id="total-pnl">+$100.45</div>
          </div>
        </div>
      </div>

      <div class="pnl-table">
        <div class="table-title">P&L Comparison</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Bot</th>
                <th>Lev</th>
                <th>P&L</th>
                <th>%</th>
              </tr>
            </thead>
            <tbody id="pnl-body">
              <!-- Rows will be inserted here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ═════════════════════════════════════════════════════════════
    // Chart Setup
    // ═════════════════════════════════════════════════════════════

    function createChart(elementId) {
      const element = document.getElementById(elementId);
      const chart = LightweightCharts.createChart(element, {
        layout: {
          background: { color: '#131722' },
          textColor: '#d1d5db',
          fontSize: 12,
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI"'
        },
        grid: {
          vertLines: { color: 'rgba(42, 50, 66, 0.5)' },
          horzLines: { color: 'rgba(42, 50, 66, 0.5)' }
        }
      });

      const candlestickSeries = chart.addCandlestickSeries({
        upColor: '#26a69a',
        downColor: '#ef5350',
        borderVisible: false,
        wickUpColor: '#26a69a',
        wickDownColor: '#ef5350'
      });

      chart.timeScale().fitContent();
      return { chart, candlestickSeries };
    }

    // Generate sample candlestick data
    function generateCandleData() {
      const data = [];
      let price = 2000;
      const now = Math.floor(Date.now() / 1000);

      for (let i = 100; i > 0; i--) {
        const time = now - (i * 300);
        const open = price;
        price += (Math.random() - 0.5) * 10;
        const high = Math.max(open, price) + Math.random() * 5;
        const low = Math.min(open, price) - Math.random() * 5;
        const close = price;
        data.push({ time, open, high, low, close });
      }
      return data;
    }

    const chart1Data = createChart('chart1');
    const chart2Data = createChart('chart2');

    const data = generateCandleData();
    chart1Data.candlestickSeries.setData(data);
    chart2Data.candlestickSeries.setData(data.map(d => ({
      ...d,
      close: d.close + (Math.random() - 0.5) * 5
    })));

    // ═════════════════════════════════════════════════════════════
    // Bot Status & P&L Data
    // ═════════════════════════════════════════════════════════════

    const botData = [
      { name: 'Grid Bot', lev: '2x', status: 'running', pnl: 12.45, change: 0.62 },
      { name: 'Grid Bot', lev: '3x', status: 'stopped', pnl: 8.92, change: -0.45 },
      { name: 'Grid Bot', lev: '5x', status: 'running', pnl: 5.23, change: 0.26 },
      { name: 'Trend Bot', lev: '2x', status: 'running', pnl: 15.67, change: 0.78 },
      { name: 'Trend Bot', lev: '3x', status: 'unknown', pnl: 0, change: 0 },
      { name: 'Trend Bot', lev: '5x', status: 'running', pnl: 22.34, change: 1.12 }
    ];

    function renderBotStatus() {
      const botList = document.getElementById('bot-list');
      const pnlBody = document.getElementById('pnl-body');

      botList.innerHTML = '';
      pnlBody.innerHTML = '';

      let activeCount = 0;
      let totalPnL = 0;

      botData.forEach((bot, idx) => {
        if (bot.status === 'running') activeCount++;
        totalPnL += bot.pnl;

        // Sidebar item
        const statusIcon = bot.status === 'running' ? '✅' :
                          bot.status === 'stopped' ? '❌' : '⚠️';
        const changeClass = bot.change > 0 ? 'change-up' : bot.change < 0 ? 'change-down' : 'change-neutral';
        const changeSign = bot.change > 0 ? '+' : '';

        const item = document.createElement('div');
        item.className = 'bot-item';
        item.innerHTML = `
          <div class="bot-header">
            <span class="bot-name">${bot.name}</span>
            <span class="bot-lever">${bot.lev}</span>
          </div>
          <div style="display: flex; align-items: center; gap: 4px;">
            <span style="font-size: 0.75rem;">${statusIcon} ${bot.status.toUpperCase()}</span>
          </div>
          <div class="bot-change">
            <span class="change-label">24h</span>
            <span class="change-value ${changeClass}">${changeSign}${bot.change.toFixed(2)}%</span>
          </div>
        `;
        botList.appendChild(item);

        // Table row
        const pnlClass = bot.pnl > 0 ? 'pnl-positive' : bot.pnl < 0 ? 'pnl-negative' : 'pnl-neutral';
        const pnlSign = bot.pnl > 0 ? '+' : '';

        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="bot-col">${bot.name}</td>
          <td>${bot.lev}</td>
          <td class="${pnlClass}">${pnlSign}$${bot.pnl.toFixed(2)}</td>
          <td class="${changeClass}">${changeSign}${bot.change.toFixed(2)}%</td>
        `;
        pnlBody.appendChild(row);
      });

      // Summary row
      const summaryRow = document.createElement('tr');
      summaryRow.className = 'summary-row';
      summaryRow.innerHTML = `
        <td class="bot-col">TOTAL</td>
        <td>—</td>
        <td class="pnl-positive">+$${totalPnL.toFixed(2)}</td>
        <td>—</td>
      `;
      pnlBody.appendChild(summaryRow);

      // Update header stats
      document.getElementById('active-bots').textContent = `${activeCount}/6`;
      const totalPnLEl = document.getElementById('total-pnl');
      totalPnLEl.textContent = `${totalPnL > 0 ? '+' : ''}$${totalPnL.toFixed(2)}`;
      totalPnLEl.style.color = totalPnL > 0 ? 'var(--green)' : totalPnL < 0 ? 'var(--red)' : 'var(--text-secondary)';
    }

    renderBotStatus();

    // Live update simulation
    setInterval(() => {
      botData.forEach(bot => {
        bot.pnl += (Math.random() - 0.5) * 2;
        bot.change += (Math.random() - 0.5) * 0.2;
      });
      renderBotStatus();
    }, 5000);

    // Handle window resize
    window.addEventListener('resize', () => {
      [chart1Data, chart2Data].forEach(({ chart }) => {
        setTimeout(() => {
          chart.applyOptions({ width: chart.parentElement.clientWidth });
        }, 0);
      });
    });
  </script>
</body>
</html>
