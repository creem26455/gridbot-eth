name: Grid Bot Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # รันทุก 5 นาที
  workflow_dispatch:          # กดรันมือได้จาก GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 4        # หมดเวลาก่อน 5 นาทีถัดไป

    strategy:
      matrix:
        leverage: ['2', '3', '5']   # monitor ทั้ง 3 leverage พร้อมกัน
      fail-fast: false              # ถ้า leverage ใดพัง ไม่หยุด leverage อื่น

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Grid Bot Monitor (${{ matrix.leverage }}x)
        env:
          OKX_API_KEY:    ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          OKX_FLAG:       ${{ secrets.OKX_FLAG }}
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          MODE:           monitor
          LEVERAGE:       ${{ matrix.leverage }}
        run: python grid_bot_eth_usdt.py
